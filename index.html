<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CoC War Stats</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <!-- Flatpickr for advanced calendar control -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/themes/dark.css">
    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
    <style>
        body { background: #121212; color: #e5e5e5; font-family: 'Inter', sans-serif; }
        .medieval { font-family: 'Cinzel', serif; }
        .panel { background: #1e1e1e; border: 1px solid #333; border-radius: 12px; }
        .th-icon { width: 44px; height: 44px; object-fit: contain; }
        .gold { color: #d4af37; }
        
        .tab-btn { flex: 1; text-align: center; padding: 14px; font-size: 12px; font-weight: bold; color: #666; border-bottom: 2px solid #222; transition: 0.3s; background: #1a1a1a; cursor: pointer; }
        .tab-btn.active { color: #d4af37; border-bottom-color: #d4af37; background: #222; }

        .hidden-section { display: none !important; }

        .btn-role { font-size: 10px; font-weight: bold; border: 1px solid #444; border-radius: 6px; padding: 6px 12px; cursor: pointer; color: #777; background: transparent; }
        .btn-role.active { border-color: #d4af37; color: #d4af37; background: rgba(212, 175, 55, 0.1); }
        .stat-label { font-size: 8px; color: #777; text-transform: uppercase; font-weight: bold; }
        .stat-value { font-size: 10px; font-weight: 600; color: #ccc; }
    </style>
</head>
<body class="p-4 md:p-10">

    <div class="max-w-7xl mx-auto mb-6 flex flex-col items-center text-center">
        <h1 id="pageTitle" class="text-3xl md:text-5xl font-bold gold medieval uppercase tracking-tighter">Dashboard</h1>
        <div class="h-1 w-16 bg-[#d4af37] mt-2"></div>
    </div>

    <div class="flex mb-6 rounded-t-lg overflow-hidden border border-[#333]">
        <button id="tab-members" class="tab-btn active medieval uppercase tracking-widest">Members</button>
        <button id="tab-war" class="tab-btn medieval uppercase tracking-widest">War</button>
    </div>

    <div class="max-w-7xl mx-auto grid grid-cols-1 lg:grid-cols-12 gap-8">
        
        <!-- Members Section -->
        <div id="section-members" class="lg:col-span-12">
            <div class="panel p-4 md:p-6">
                <div class="flex flex-col gap-6 mb-6">
                    <div class="flex justify-between items-center">
                        <h2 id="memberTitle" class="medieval text-lg font-bold">Current Members</h2>
                        <span id="memberCount" class="text-[10px] font-mono text-gray-500">0 / 50</span>
                    </div>

                    <div class="flex flex-wrap items-center gap-4 p-4 bg-[#1a1a1a] rounded-xl border border-gray-800">
                        <!-- Filters -->
                        <div class="flex flex-wrap gap-2 pr-4 border-r border-gray-800">
                            <button data-role="all" class="btn-role active">ALL</button>
                            <button data-role="leader" class="btn-role">LEADER</button>
                            <button data-role="coLeader" class="btn-role">CO-LEADER</button>
                            <button data-role="admin" class="btn-role">ELDER</button>
                            <button data-role="member" class="btn-role">MEMBER</button>
                        </div>
                        
                        <!-- Controls -->
                        <div class="flex flex-wrap items-center gap-4">
                            <div class="flex items-center gap-2">
                                <span class="text-[10px] font-bold text-gray-500 uppercase">Date:</span>
                                <input type="text" id="memberDate" class="bg-[#252525] border border-gray-700 text-[10px] p-1.5 rounded text-gray-300 font-mono outline-none focus:border-gold transition-colors" placeholder="Select Date...">
                            </div>
                            <div class="flex items-center gap-2">
                                <span class="text-[10px] font-bold text-gray-500 uppercase">Sort:</span>
                                <select id="sortBy" class="bg-[#252525] border border-gray-700 text-[10px] p-1.5 rounded text-gray-300 outline-none focus:border-gold transition-colors">
                                    <option value="league" selected>League + Trophies</option>
                                    <option value="trophies">Trophies Only</option>
                                    <option value="townHallLevel">Town Hall</option>
                                    <option value="expLevel">XP Level</option>
                                    <option value="donations">Donated</option>
                                    <option value="donationsReceived">Received</option>
                                    <option value="role">Role</option>
                                </select>
                            </div>
                        </div>
                    </div>
                </div>
                <div id="memberList" class="space-y-2"></div>
            </div>
        </div>

        <!-- War Section -->
        <div id="section-war" class="lg:col-span-12 hidden-section">
            <div class="panel p-4 md:p-6">
                <div id="warListView">
                    <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4 mb-6">
                        <h2 class="medieval text-lg font-bold">War History</h2>
                        <div class="flex items-center gap-2">
                            <span class="text-[10px] font-bold text-gray-500 uppercase">Range:</span>
                            <input type="date" id="warStartDate" class="bg-[#252525] border border-gray-700 text-[10px] p-1 rounded text-gray-500 font-mono">
                            <span class="text-gray-600 text-[10px]">-</span>
                            <input type="date" id="warEndDate" class="bg-[#252525] border border-gray-700 text-[10px] p-1 rounded text-gray-500 font-mono">
                        </div>
                    </div>
                    <div id="warHistoryList" class="space-y-4">
                        <!-- War history items will be rendered here -->
                    </div>
                </div>

                <div id="warDetailView" class="hidden">
                    <button id="backToWarList" class="mb-4 text-xs gold hover:underline flex items-center gap-1">
                        ← Back to History
                    </button>
                    
                    <div id="warSummary" class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-6 p-4 bg-[#252525] rounded-xl border border-dashed border-gray-700">
                        <div class="text-center">
                            <p class="stat-label" id="clanNameDetail">Clan</p>
                            <p id="totalStars" class="text-xl font-bold">0</p>
                            <p id="totalDestruction" class="text-sm font-bold text-gray-400">0%</p>
                            <p id="clanAttacks" class="text-[10px] text-gray-500">0/0 Attacks</p>
                        </div>
                        <div class="flex flex-col items-center justify-center">
                            <span class="medieval gold text-lg">VS</span>
                        </div>
                        <div class="text-center">
                            <p class="stat-label" id="opponentNameDetail">Opponent</p>
                            <p id="opponentStars" class="text-xl font-bold">0</p>
                            <p id="opponentDestruction" class="text-sm font-bold text-gray-400">0%</p>
                            <p id="opponentAttacks" class="text-[10px] text-gray-500">0/0 Attacks</p>
                        </div>
                    </div>

                    <div id="warResults" class="space-y-4">
                        <!-- War detail content will now be a single column of wide rows -->
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script type="module" src="js/app.js"></script>
</body>
</html>
