<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CoC War Stats</title>
    
    <!-- External Dependencies -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/themes/dark.css">
    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <!-- Custom Styles -->
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="p-3 md:p-10">
    <!-- Header Section -->
    <div class="max-w-7xl mx-auto mb-6 flex flex-col items-center text-center">
        <div id="headerContent" class="flex items-center gap-3 md:gap-4">
            <img id="clanBadge" class="w-10 h-10 md:w-16 md:h-16 hidden" alt="Clan Badge">
            <h1 id="pageTitle" class="text-2xl md:text-5xl font-bold gold medieval uppercase tracking-tighter">Dashboard</h1>
        </div>
        <div class="h-1 w-16 bg-[#d4af37] mt-2"></div>
    </div>

    <!-- Main Navigation Tabs -->
    <div class="flex mb-6 rounded-t-lg overflow-hidden border border-[#333]">
        <button id="tab-about" class="tab-btn active medieval uppercase tracking-widest">About</button>
        <button id="tab-members" class="tab-btn medieval uppercase tracking-widest">Members</button>
        <button id="tab-war" class="tab-btn medieval uppercase tracking-widest">War</button>
    </div>

    <div class="max-w-7xl mx-auto">
        <!-- Section: About -->
        <div id="section-about" class="lg:col-span-12">
            <div id="aboutContent"></div>
        </div>

        <!-- Section: Members -->
        <div id="section-members" class="lg:col-span-12 hidden-section">
            <div class="panel p-3 md:p-6">
                <div class="flex flex-col gap-4 md:gap-6 mb-6">
                    <div class="flex justify-between items-center px-1">
                        <h2 id="memberTitle" class="medieval text-base md:text-lg font-bold">Current Members</h2>
                        <span id="memberCount" class="text-[9px] md:text-[10px] font-mono text-gray-500">0 / 50</span>
                    </div>
                    
                    <!-- Member Filters -->
                    <div class="flex flex-col gap-4 p-3 md:p-4 bg-[#1a1a1a] rounded-xl border border-gray-800">
                        <div class="flex flex-col md:flex-row md:items-center gap-3">
                            <div class="flex items-center gap-2">
                                <svg xmlns="http://www.w3.org/2000/svg" class="w-3.5 h-3.5 text-gray-500" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 4a1 1 0 011-1h16a1 1 0 011 1v2.586a1 1 0 01-.293.707l-6.414 6.414a1 1 0 00-.293.707V17l-4 4v-6.586a1 1 0 00-.293-.707L3.293 7.293A1 1 0 013 6.586V4z" /></svg>
                                <span class="text-[10px] font-bold text-gray-500 uppercase">Role:</span>
                            </div>
                            <div class="flex flex-wrap gap-2">
                                <button data-role="all" class="btn-role active">ALL</button>
                                <button data-role="leader" class="btn-role">LEADER</button>
                                <button data-role="coLeader" class="btn-role">CO-LEADER</button>
                                <button data-role="admin" class="btn-role">ELDER</button>
                                <button data-role="member" class="btn-role">MEMBER</button>
                            </div>
                        </div>
                        <div class="grid grid-cols-1 sm:grid-cols-2 lg:flex lg:items-center gap-4 lg:gap-6">
                            <div class="flex items-center gap-2">
                                <svg xmlns="http://www.w3.org/2000/svg" class="w-3.5 h-3.5 text-gray-500" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z" /></svg>
                                <span class="text-[10px] font-bold text-gray-500 uppercase">Date:</span>
                                <input type="text" id="memberDate" class="control-base flex-1 md:w-32 font-mono" placeholder="Select Date...">
                            </div>
                            <div class="flex items-center gap-2">
                                <svg xmlns="http://www.w3.org/2000/svg" class="w-3.5 h-3.5 text-gray-500" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 4h13M3 8h9m-9 4h6m4 0l4-4m0 0l4 4m-4-4v12" /></svg>
                                <span class="text-[10px] font-bold text-gray-500 uppercase">Sort:</span>
                                <select id="sortBy" class="control-base flex-1">
                                    <option value="league" selected>League + Trophies</option>
                                    <option value="trophies">Trophies Only</option>
                                    <option value="townHallLevel">Town Hall</option>
                                    <option value="expLevel">XP Level</option>
                                    <option value="donations">Donated</option>
                                    <option value="donationsReceived">Received</option>
                                    <option value="role">Role</option>
                                </select>
                            </div>
                            <button id="clearMembersFilters" class="text-[10px] font-bold text-gray-500 hover:text-gold uppercase transition-colors sm:col-span-2 lg:ml-auto">Clear</button>
                        </div>
                    </div>
                </div>
                <!-- Member list container -->
                <div id="memberList" class="space-y-2"></div>
            </div>
        </div>

        <!-- Section: War -->
        <div id="section-war" class="lg:col-span-12 hidden-section">
            <div class="panel p-3 md:p-6">
                <!-- War Sub-tabs -->
                <div class="flex items-center gap-2 mb-6 p-1 bg-[#1a1a1a] rounded-lg w-fit border border-gray-800">
                    <button id="subtab-history" class="sub-tab-btn active uppercase tracking-wider">History</button>
                    <button id="subtab-stats" class="sub-tab-btn uppercase tracking-wider">Stats</button>
                </div>

                <!-- View: War History List -->
                <div id="warListView">
                    <div class="flex flex-col md:flex-row justify-between items-start md:items-center gap-4 mb-6 px-1">
                        <h2 class="medieval text-base md:text-lg font-bold">War History</h2>
                        <div class="flex flex-col sm:flex-row items-start sm:items-center gap-3 w-full md:w-auto">
                            <div class="flex items-center gap-2">
                                <svg xmlns="http://www.w3.org/2000/svg" class="w-3.5 h-3.5 text-gray-500" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z" /></svg>
                                <span class="text-[10px] font-bold text-gray-500 uppercase">Date Range:</span>
                            </div>
                            <div class="flex items-center gap-2 w-full sm:w-auto">
                                <input type="text" id="warStartDate" class="control-base flex-1 sm:w-32 font-mono" placeholder="Start Date">
                                <span class="text-gray-600 text-[10px]">-</span>
                                <input type="text" id="warEndDate" class="control-base flex-1 sm:w-32 font-mono" placeholder="End Date">
                                <button id="clearWarFilters" class="text-[10px] font-bold text-gray-500 hover:gold uppercase transition-colors ml-1">Clear</button>
                            </div>
                        </div>
                    </div>
                    <div id="warHistoryList" class="space-y-4"></div>
                </div>

                <!-- View: War Analytics -->
                <div id="warStatsView" class="hidden">
                    <h2 class="medieval text-base md:text-lg font-bold mb-6">War Stats</h2>
                    <div class="space-y-8">
                        <div class="bg-[#1a1a1a] p-4 rounded-xl border border-gray-800">
                            <h3 class="text-[10px] font-bold text-gray-500 uppercase mb-4 tracking-widest">War Stars Achieved (%)</h3>
                            <div id="starsTrendContainer" style="height: 180px;">
                                <canvas id="starsTrendChart"></canvas>
                            </div>
                        </div>
                        <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
                            <div class="bg-[#1a1a1a] p-4 rounded-xl border border-gray-800">
                                <h3 class="text-[10px] font-bold text-gray-500 uppercase mb-4 tracking-widest">Stars Earned Breakdown</h3>
                                <div id="topPerformersContainer" class="overflow-x-auto"></div>
                            </div>
                            <div class="bg-[#1a1a1a] p-4 rounded-xl border border-gray-800">
                                <h3 class="text-[10px] font-bold text-gray-500 uppercase mb-4 tracking-widest">Stars Conversion Rates</h3>
                                <div id="efficiencyContainer">
                                    <canvas id="efficiencyChart"></canvas>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- View: War Details (Hidden by default) -->
                <div id="warDetailView" class="hidden">
                    <button id="backToWarList" class="mb-4 text-xs gold hover:underline flex items-center gap-1">← Back to History</button>
                    
                    <!-- War Summary Card -->
                    <div id="warSummary" class="flex flex-row items-center justify-between gap-2 p-4 bg-[#252525] rounded-xl border border-dashed border-gray-700 min-h-[100px]">
                        <div class="flex items-center gap-2 md:gap-3 w-1/3 text-left">
                            <img id="detailClanBadge" src="" class="w-8 h-8 md:w-10 md:h-10">
                            <div class="min-w-0">
                                <p id="clanNameDetail" class="text-[11px] md:text-xs font-bold text-white truncate">Clan</p>
                                <p id="clanAttacks" class="text-[8px] md:text-[9px] text-gray-500">0/0 Attacks</p>
                            </div>
                        </div>
                        <div id="warResultHeader" class="flex flex-col items-center justify-center w-1/3 text-center px-1"></div>
                        <div class="flex items-center gap-2 md:gap-3 text-right justify-end w-1/3">
                            <div class="min-w-0">
                                <p id="opponentNameDetail" class="text-[11px] md:text-xs font-bold text-white truncate">Opponent</p>
                                <p id="opponentAttacks" class="text-[8px] md:text-[9px] text-gray-500">0/0 Attacks</p>
                            </div>
                            <img id="detailOpponentBadge" src="" class="w-8 h-8 md:w-10 md:h-10">
                        </div>
                    </div>
                    
                    <!-- War Metrics Container (Probability, Ratio, etc) -->
                    <div id="warMetrics" class="grid grid-cols-2 md:grid-cols-4 gap-4 my-6"></div>
                    
                    <!-- Attacks/Map container -->
                    <div id="warResults" class="space-y-4"></div>
                </div>
            </div>
        </div>
    </div>

    <!-- Main Entry Point -->
    <script type="module" src="js/app.js"></script>
</body>
</html>
